name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift cache directories
        run: mkdir -p .build-local/clang-cache

      - name: Run repo checks
        run: bash scripts/check.sh
